<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASL AI Adventure</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
  text-align:center;
}

h1{ color:#ef4444; }

#homeScreen{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

button{
  background:#ef4444;
  border:none;
  padding:15px 30px;
  font-size:20px;
  border-radius:12px;
  color:white;
  cursor:pointer;
}

button:hover{ background:#3b82f6; }

#mainApp{ display:none; }

.level-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
  gap:10px;
  padding:20px;
}

.level{
  background:#ef4444;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

.level:hover{ background:#3b82f6; }

.locked{
  opacity:0.4;
  cursor:not-allowed;
}

video{
  width:360px;
  border-radius:15px;
  transform:scaleX(-1);
  margin-top:15px;
}

iframe{
  margin-top:20px;
  border-radius:15px;
}

.bigResult{
  font-size:40px;
  margin-top:20px;
  font-weight:bold;
}

#tiger{
  position:fixed;
  bottom:20px;
  right:20px;
  font-size:70px;
  transition:0.3s;
}

#tigerSpeech{
  position:fixed;
  bottom:110px;
  right:20px;
  background:white;
  color:black;
  padding:10px 15px;
  border-radius:15px;
  max-width:220px;
}
</style>
</head>

<body>

<!-- HOME SCREEN -->
<div id="homeScreen">
  <h1>🐯 ASL AI Adventure 🐯</h1>
  <h2>Start Your ASL Journey!</h2>
  <button onclick="enterApp()">Start Your ASL Adventure</button>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <h1>ASL AI Recognition System</h1>
  <div class="level-grid" id="levels"></div>
  <div id="lessonBox"></div>
</div>

<div id="tiger">🐯</div>
<div id="tigerSpeech">Welcome! Click start to begin!</div>

<script>

function enterApp(){
  document.getElementById("homeScreen").style.display="none";
  document.getElementById("mainApp").style.display="block";
  speakTiger("Choose a level!");
}

// Generate 30 levels
const container=document.getElementById("levels");
for(let i=1;i<=30;i++){
  let d=document.createElement("div");
  d.className="level";
  d.innerText="Level "+i;
  if(i>=5) d.classList.add("locked");
  else d.onclick=()=>startLevel(i);
  container.appendChild(d);
}

let currentTarget="";
let detectionTimer=null;

const letters=["A","B","C"];
const phrases=["HELLO","THANK YOU","YES"];

function startLevel(level){

  // LEVEL 1 - Alphabet Video
  if(level===1){
    document.getElementById("lessonBox").innerHTML=`
      <h2>ASL Alphabet Lesson</h2>
      <iframe width="560" height="315"
      src="https://www.youtube.com/embed/AYjFPCHXkj4"
      allowfullscreen></iframe>
    `;
    speakTiger("Let's learn the alphabet!");
  }

  // LEVEL 2 - Letter Scanner
  if(level===2){
    startScanner("letters");
  }

  // LEVEL 3 - Phrase Video
  if(level===3){
    document.getElementById("lessonBox").innerHTML=`
      <h2>Basic ASL Phrases</h2>
      <iframe width="560" height="315"
      src="https://www.youtube.com/embed/RZQTVnzMx4U"
      allowfullscreen></iframe>
    `;
    speakTiger("Watch closely and practice!");
  }

  // LEVEL 4 - Phrase Scanner
  if(level===4){
    startScanner("phrases");
  }
}

async function startScanner(mode){

  if(mode==="letters"){
    currentTarget=letters[Math.floor(Math.random()*letters.length)];
  }else{
    currentTarget=phrases[Math.floor(Math.random()*phrases.length)];
  }

  document.getElementById("lessonBox").innerHTML=`
    <h2>Sign: ${currentTarget}</h2>
    <video id="vid" autoplay playsinline></video>
    <div id="scanStatus">Requesting camera...</div>
    <div class="bigResult" id="bigResult"></div>
  `;

  speakTiger("Hold your sign steady...");

  const video=document.getElementById("vid");

  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject=stream;
    document.getElementById("scanStatus").innerText="Scanning...";
  }catch(e){
    document.getElementById("scanStatus").innerText="Camera blocked!";
    speakTiger("Please allow camera access!");
    return;
  }

  const hands=new Hands({
    locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
  });

  hands.onResults(res=>{
    if(res.multiHandLandmarks.length>0){
      const guess=detectGesture(res.multiHandLandmarks[0],mode);

      if(guess===currentTarget){
        if(!detectionTimer){
          detectionTimer=setTimeout(()=>{
            showResult(true);
            detectionTimer=null;
          },1000);
        }
      }
    }
  });

  new Camera(video,{
    onFrame:async()=>{await hands.send({image:video});},
    width:360,
    height:270
  }).start();
}

function showResult(correct){
  const result=document.getElementById("bigResult");

  if(correct){
    result.innerText="YES! YOU GOT IT!";
    result.style.color="#3b82f6";
    document.getElementById("tiger").innerText="🐯😄";
    speakTiger("Amazing job!");
  }else{
    result.innerText="TRY AGAIN!";
    result.style.color="#ef4444";
    document.getElementById("tiger").innerText="🐯😢";
    speakTiger("Try again!");
  }
}

function detectGesture(lm,mode){

  const wrist=lm[0];
  const index=lm[8];
  const middle=lm[12];
  const thumb=lm[4];

  if(mode==="letters"){
    if(distance(index,wrist)<0.12 &&
       distance(middle,wrist)<0.12) return "A";

    if(index.y<lm[6].y &&
       middle.y<lm[10].y) return "B";

    if(distance(thumb,index)>0.18) return "C";
  }

  if(mode==="phrases"){
    if(index.y<lm[6].y &&
       middle.y<lm[10].y) return "HELLO";

    if(distance(thumb,index)<0.08) return "THANK YOU";

    if(distance(index,wrist)<0.12) return "YES";
  }

  return "Unknown";
}

function distance(a,b){
  return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);
}

function speakTiger(text){
  document.getElementById("tigerSpeech").innerText=text;
}

</script>

</body>
</html>
